  <!-- Explains what the user must do to unlock the secret message -->
  <p>Enter your first name, last name, and zip code below, then press the button to unlock the secret message.</p>
<!-- Form holding every input box and one submit button; calls validateInputs() from strings.js on submit -->
  <form onsubmit="return validateInputs();">
  <!-- Label and text box for the user's first name -->
  <label for="firstName">First Name:</label>
  <input type="text" id="firstName">
  <br>
  <!-- Label and text box for the user's last name -->
  <label for="lastName">Last Name:</label>
  <input type="text" id="lastName">
  <br>
  <!-- Label and text box for the user's zip code -->
  <label for="zipCode">Zip Code:</label>
  <input type="text" id="zipCode">
  <br>
  <!-- Single submit button that submits every input box at once -->
  <button type="submit">Unlock Secret Message</button>
</form>
<!-- This div is where our JavaScript writes warnings or the secret message using innerHTML -->
  <div id="resultArea"></div>
